name: lint
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  # Runs golangci-lint over the nmt repository
  # This workflow is run on every pull request and push to main
  # The `golangci` job will pass without running if no *.{go, mod, sum} files have been modified.
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: technote-space/get-diff-action@f27caffdd0fb9b13f4fc191c016bb4e0632844af # v6
        with:
          SUFFIX_FILTER: |
            .go
            .mod
            .sum
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.1.6
          args: --timeout 10m
        if: env.GIT_DIFF

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: celestiaorg/.github/.github/actions/markdown-lint@04535a74c285ebb9fd7113fb536dedfe5e25f6e5 # main
