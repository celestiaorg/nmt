name: lint
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  # Runs golangci-lint over the nmt repository
  # This workflow is run on every pull request and push to main
  # The `golangci` job will pass without running if no *.{go, mod, sum} files have been modified.
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: technote-space/get-diff-action@f27caffdd0fb9b13f4fc191c016bb4e0632844af # v6
        with:
          SUFFIX_FILTER: |
            .go
            .mod
            .sum
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.1.6
          args: --timeout 10m
        if: env.GIT_DIFF

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: celestiaorg/.github/.github/actions/markdown-lint@33bbeb98fdf8d910a236e365b5f013cdfb81c082 # v0.6.5
